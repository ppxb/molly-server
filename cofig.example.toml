[app]
name = "molly-server"
env = "development"

[http]
host = "0.0.0.0"
port = 8080
read_timeout_seconds = 15
write_timeout_seconds = 30
idle_timeout_seconds = 60
shutdown_timeout_seconds = 10

[log]
level = "info"

[database]
dsn = "postgres://postgres:postgres@127.0.0.1:5432/molly?sslmode=disable"
max_open_conns = 32
max_idle_conns = 16
conn_max_lifetime_minutes = 30
auto_migrate = true

[rate_limit]
enabled = true
requests_per_second = 200
burst = 400

[upload]
domain_id = "bj29"
location = "cn-beijing"
default_drive_id = "default"
upload_url_ttl_secs = 900
download_url_ttl_secs = 900
recycle_retention_days = 10

[object_storage]
endpoint = "http://127.0.0.1:9000"
region = "us-east-1"
access_key_id = "your-access-key-id"
secret_access_key = "your-secret-access-key"
bucket = "molly"
force_path_style = true
